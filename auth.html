<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARA — Neural Authentication Portal</title>
    <meta name="description" content="Access the ZAARA AI Career Neural Matrix. Log in or create your agent profile to generate personalized career roadmaps.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js" defer></script>
    <style>
        :root {
            --neon-purple: #8B5CF6;
            --neon-pink: #EC4899;
            --bg-black: #050505;
            --surface-dark: rgba(15, 15, 20, 0.6);
            --glass-border: rgba(139, 92, 246, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated Background ─────────────────────────────── */
        .auth-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .auth-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse 800px 600px at 20% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 600px 800px at 80% 70%, rgba(236, 72, 153, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 400px 400px at 50% 50%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
            animation: bgDrift 20s ease-in-out infinite alternate;
        }

        @keyframes bgDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-30px, 20px) rotate(3deg); }
        }

        /* Grid pattern overlay */
        .auth-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridScroll 30s linear infinite;
        }

        @keyframes gridScroll {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--neon-purple);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            20% { opacity: 0.6; }
            80% { opacity: 0.4; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }

        /* CRT scanlines */
        .scanlines-auth {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ── Auth Container ──────────────────────────────── */
        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
        }

        .auth-card {
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(139, 92, 246, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .auth-card:hover {
            box-shadow:
                0 30px 70px rgba(0, 0, 0, 0.5),
                0 0 50px rgba(139, 92, 246, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Logo & Header ───────────────────────────────── */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            height: 80px;
            width: auto;
            margin-bottom: 12px;
            animation: logoPulse 3s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.3));
        }

        @keyframes logoPulse {
            from { transform: scale(1); filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.3)); }
            to { transform: scale(1.03); filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.5)); }
        }

        .auth-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .auth-subtitle {
            color: #71717a;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .auth-subtitle .mode-label {
            color: #a78bfa;
            font-weight: 600;
        }

        /* ── Tab Switcher ────────────────────────────────── */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #71717a;
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }

        .auth-tab:hover {
            color: #a1a1aa;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.1));
            color: #fff;
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        /* ── Form Styles ─────────────────────────────────── */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .auth-form.hidden-form {
            display: none;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #a1a1aa;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .form-group label .required-star {
            color: var(--neon-pink);
            margin-left: 2px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #52525b;
            font-size: 0.85rem;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input::placeholder {
            color: #3f3f46;
        }

        .input-wrapper input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12), 0 0 15px rgba(139, 92, 246, 0.1);
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i {
            color: var(--neon-purple);
        }

        /* Password visibility toggle */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #52525b;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            transition: color 0.2s;
            pointer-events: all;
        }

        .password-toggle:hover {
            color: var(--neon-purple);
        }

        /* ── Submit Button ───────────────────────────────── */
        .auth-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--neon-purple), #7c3aed);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .auth-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .auth-submit:hover::before {
            transform: translateX(100%);
        }

        .auth-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4), 0 0 40px rgba(139, 92, 246, 0.15);
        }

        .auth-submit:active {
            transform: translateY(0);
        }

        .auth-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-submit .btn-text {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-submit .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .auth-submit.loading .spinner {
            display: inline-block;
        }

        .auth-submit.loading .btn-label {
            display: none;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* ── OAuth Divider ───────────────────────────────── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 4px 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        }

        .auth-divider span {
            color: #52525b;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            white-space: nowrap;
        }

        /* ── OAuth Buttons ───────────────────────────────── */
        .oauth-buttons {
            display: flex;
            gap: 12px;
        }

        .oauth-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #d4d4d8;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .oauth-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .oauth-btn i {
            font-size: 1.1rem;
        }

        .oauth-btn.google i { color: #ea4335; }
        .oauth-btn.github i { color: #fff; }

        /* ── Forgot Password Link ────────────────────────── */
        .forgot-link {
            text-align: right;
            margin-top: -8px;
        }

        .forgot-link a {
            color: #a78bfa;
            font-size: 0.78rem;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .forgot-link a:hover {
            color: var(--neon-purple);
            text-decoration: underline;
        }

        /* ── Error & Success Messages ────────────────────── */
        .auth-message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.84rem;
            display: none;
            align-items: center;
            gap: 8px;
            animation: messageAppear 0.3s ease;
        }

        .auth-message.show {
            display: flex;
        }

        .auth-message.error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .auth-message.success {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .auth-message.info {
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
        }

        @keyframes messageAppear {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Footer ──────────────────────────────────────── */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .auth-footer p {
            color: #52525b;
            font-size: 0.8rem;
        }

        .auth-footer a {
            color: var(--neon-purple);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: var(--neon-pink);
        }

        /* ── Password Strength Meter ─────────────────────── */
        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .strength-bar {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 99px;
            transition: background 0.3s ease;
        }

        .strength-bar.weak { background: #ef4444; }
        .strength-bar.medium { background: #f59e0b; }
        .strength-bar.strong { background: #22c55e; }

        .strength-label {
            font-size: 0.68rem;
            margin-top: 4px;
            color: #52525b;
            transition: color 0.3s;
        }

        .strength-label.weak { color: #ef4444; }
        .strength-label.medium { color: #f59e0b; }
        .strength-label.strong { color: #22c55e; }

        /* ── Reset Password View ─────────────────────────── */
        .reset-view {
            display: none;
        }

        .reset-view.active {
            display: block;
        }

        .back-to-login {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #71717a;
            font-size: 0.8rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            margin-bottom: 20px;
            transition: color 0.2s;
        }

        .back-to-login:hover {
            color: var(--neon-purple);
        }

        /* ── Status Bar ──────────────────────────────────── */
        .auth-status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-family: 'VT323', monospace;
            font-size: 0.85rem;
            color: #52525b;
            letter-spacing: 2px;
            text-align: center;
        }

        .auth-status .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--neon-purple);
            border-radius: 50%;
            margin-right: 8px;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 4px var(--neon-purple); opacity: 0.6; }
            50% { box-shadow: 0 0 12px var(--neon-purple); opacity: 1; }
        }

        /* ── Responsive ──────────────────────────────────── */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 24px;
            }

            .auth-logo {
                height: 60px;
            }

            .auth-title {
                font-size: 1.3rem;
            }

            .oauth-buttons {
                flex-direction: column;
            }
        }

        /* ── Custom Scrollbar ────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 6px; }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="auth-bg"></div>
    <div class="scanlines-auth"></div>

    <!-- Floating Particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s; animation-duration: 7s;"></div>
    <div class="particle" style="left: 25%; animation-delay: 1.5s; animation-duration: 9s;"></div>
    <div class="particle" style="left: 40%; animation-delay: 3s; animation-duration: 6s;"></div>
    <div class="particle" style="left: 55%; animation-delay: 0.5s; animation-duration: 8s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 2s; animation-duration: 10s;"></div>
    <div class="particle" style="left: 85%; animation-delay: 4s; animation-duration: 7.5s;"></div>
    <div class="particle" style="left: 15%; animation-delay: 5s; animation-duration: 9.5s;"></div>
    <div class="particle" style="left: 60%; animation-delay: 1s; animation-duration: 6.5s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 3.5s; animation-duration: 8.5s;"></div>
    <div class="particle" style="left: 35%; animation-delay: 2.5s; animation-duration: 11s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 4.5s; animation-duration: 7s; background: var(--neon-pink);"></div>
    <div class="particle" style="left: 75%; animation-delay: 0.8s; animation-duration: 9s; background: var(--neon-pink);"></div>

    <!-- Status Bar -->
    <div class="auth-status">
        <span class="status-dot"></span>ZAARA NEURAL AUTH PORTAL v2.0
    </div>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card" id="auth-card">

            <!-- Header -->
            <div class="auth-header">
                <img src="zaara-logo-2d.png" alt="ZAARA" class="auth-logo" id="auth-logo">
                <h1 class="auth-title" id="auth-page-title">Neural Access</h1>
                <p class="auth-subtitle" id="auth-page-subtitle">Authenticate to access your <span class="mode-label">Career Matrix</span></p>
            </div>

            <!-- Message Area -->
            <div class="auth-message" id="auth-message">
                <i class="fa-solid fa-circle-info"></i>
                <span id="auth-message-text"></span>
            </div>

            <!-- ═══ Main Auth View ════════════════════════ -->
            <div id="main-auth-view">
                <!-- Tab Switcher -->
                <div class="auth-tabs" id="auth-tabs">
                    <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">
                        <i class="fa-solid fa-right-to-bracket"></i> Login
                    </button>
                    <button class="auth-tab" data-tab="signup" onclick="switchTab('signup')">
                        <i class="fa-solid fa-user-plus"></i> Sign Up
                    </button>
                </div>

                <!-- Login Form -->
                <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email <span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <input type="email" id="login-email" placeholder="agent@zaara.io" required autocomplete="email">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password <span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="login-password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                            <i class="fa-solid fa-lock"></i>
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('login-password', this)">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="forgot-link">
                        <a onclick="showResetView()">Forgot password?</a>
                    </div>

                    <button type="submit" class="auth-submit" id="login-btn">
                        <span class="btn-text">
                            <span class="spinner"></span>
                            <span class="btn-label"><i class="fa-solid fa-right-to-bracket"></i> Initialize Session</span>
                        </span>
                    </button>

                    <div class="auth-divider"><span>or continue with</span></div>

                    <div class="oauth-buttons">
                        <button type="button" class="oauth-btn google" onclick="handleOAuth('google')">
                            <i class="fa-brands fa-google"></i> Google
                        </button>
                        <button type="button" class="oauth-btn github" onclick="handleOAuth('github')">
                            <i class="fa-brands fa-github"></i> GitHub
                        </button>
                    </div>
                </form>

                <!-- Signup Form -->
                <form class="auth-form hidden-form" id="signup-form" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="signup-name" placeholder="Agent Name" autocomplete="name">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email <span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <input type="email" id="signup-email" placeholder="agent@zaara.io" required autocomplete="email">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password <span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="signup-password" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
                            <i class="fa-solid fa-lock"></i>
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('signup-password', this)">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength" id="password-strength">
                            <div class="strength-bar" id="str-bar-1"></div>
                            <div class="strength-bar" id="str-bar-2"></div>
                            <div class="strength-bar" id="str-bar-3"></div>
                            <div class="strength-bar" id="str-bar-4"></div>
                        </div>
                        <div class="strength-label" id="strength-label"></div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password <span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="signup-confirm" placeholder="Re-enter password" required minlength="6" autocomplete="new-password">
                            <i class="fa-solid fa-shield-halved"></i>
                        </div>
                    </div>

                    <button type="submit" class="auth-submit" id="signup-btn">
                        <span class="btn-text">
                            <span class="spinner"></span>
                            <span class="btn-label"><i class="fa-solid fa-user-plus"></i> Create Agent Profile</span>
                        </span>
                    </button>

                    <div class="auth-divider"><span>or continue with</span></div>

                    <div class="oauth-buttons">
                        <button type="button" class="oauth-btn google" onclick="handleOAuth('google')">
                            <i class="fa-brands fa-google"></i> Google
                        </button>
                        <button type="button" class="oauth-btn github" onclick="handleOAuth('github')">
                            <i class="fa-brands fa-github"></i> GitHub
                        </button>
                    </div>
                </form>
            </div>

            <!-- ═══ Reset Password View ═══════════════════ -->
            <div id="reset-view" class="reset-view">
                <button class="back-to-login" onclick="hideResetView()">
                    <i class="fa-solid fa-arrow-left"></i> Back to Login
                </button>

                <form class="auth-form" id="reset-form" onsubmit="handleReset(event)">
                    <div class="form-group">
                        <label>Email Address <span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <input type="email" id="reset-email" placeholder="Enter your registered email" required autocomplete="email">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>

                    <button type="submit" class="auth-submit" id="reset-btn">
                        <span class="btn-text">
                            <span class="spinner"></span>
                            <span class="btn-label"><i class="fa-solid fa-paper-plane"></i> Send Reset Link</span>
                        </span>
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="auth-footer" id="auth-footer">
                <p>Protected by <a href="#">ZAARA Neural Security</a> • <span style="color: #3f3f46;">v2.0</span></p>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // Auth Page Controller
        // ═══════════════════════════════════════════════════════════════

        // On load — check if already authenticated
        document.addEventListener('DOMContentLoaded', async () => {
            await ZaaraAuth.init();
            if (ZaaraAuth.isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }

            // Check URL params for mode
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode');
            if (mode === 'signup') {
                switchTab('signup');
            } else if (mode === 'reset') {
                showResetView();
            }
        });

        // ── Tab Switching ─────────────────────────────────────────────
        function switchTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab[data-tab="${tab}"]`).classList.add('active');

            // Show/hide forms
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');

            if (tab === 'login') {
                loginForm.classList.remove('hidden-form');
                signupForm.classList.add('hidden-form');
                document.getElementById('auth-page-title').textContent = 'Neural Access';
                document.getElementById('auth-page-subtitle').innerHTML = 'Authenticate to access your <span class="mode-label">Career Matrix</span>';
            } else {
                loginForm.classList.add('hidden-form');
                signupForm.classList.remove('hidden-form');
                document.getElementById('auth-page-title').textContent = 'Create Profile';
                document.getElementById('auth-page-subtitle').innerHTML = 'Register your neural identity in the <span class="mode-label">ZAARA System</span>';
            }

            hideMessage();
        }

        // ── Login Handler ─────────────────────────────────────────────
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');

            if (!email || !password) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            const result = await ZaaraAuth.signIn(email, password);

            if (result.success) {
                showMessage('Access granted. Redirecting to Neural Matrix...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1200);
            } else {
                showMessage(result.message, 'error');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ── Signup Handler ────────────────────────────────────────────
        async function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            const btn = document.getElementById('signup-btn');

            if (!email || !password || !confirm) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            const result = await ZaaraAuth.signUp(email, password, name);

            if (result.success) {
                if (result.needsConfirmation) {
                    showMessage(result.message, 'info');
                } else {
                    showMessage('Agent profile created! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1200);
                }
            } else {
                showMessage(result.message, 'error');
            }

            btn.classList.remove('loading');
            btn.disabled = false;
        }

        // ── OAuth Handler ─────────────────────────────────────────────
        async function handleOAuth(provider) {
            const result = await ZaaraAuth.signInWithOAuth(provider);
            if (!result.success) {
                showMessage(result.message, 'error');
            }
            // OAuth will redirect automatically
        }

        // ── Password Reset Handler ────────────────────────────────────
        async function handleReset(e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value.trim();
            const btn = document.getElementById('reset-btn');

            if (!email) {
                showMessage('Please enter your email address.', 'error');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            const result = await ZaaraAuth.resetPassword(email);

            if (result.success) {
                showMessage(result.message, 'success');
            } else {
                showMessage(result.message, 'error');
            }

            btn.classList.remove('loading');
            btn.disabled = false;
        }

        // ── View Toggles ─────────────────────────────────────────────
        function showResetView() {
            document.getElementById('main-auth-view').style.display = 'none';
            document.getElementById('reset-view').classList.add('active');
            document.getElementById('auth-page-title').textContent = 'Reset Password';
            document.getElementById('auth-page-subtitle').innerHTML = 'Recover access to your <span class="mode-label">Agent Profile</span>';
            hideMessage();
        }

        function hideResetView() {
            document.getElementById('main-auth-view').style.display = 'block';
            document.getElementById('reset-view').classList.remove('active');
            switchTab('login');
        }

        // ── Password Visibility Toggle ────────────────────────────────
        function togglePasswordVisibility(inputId, toggleBtn) {
            const input = document.getElementById(inputId);
            const icon = toggleBtn.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // ── Password Strength Checker ─────────────────────────────────
        function checkPasswordStrength(password) {
            const bars = [
                document.getElementById('str-bar-1'),
                document.getElementById('str-bar-2'),
                document.getElementById('str-bar-3'),
                document.getElementById('str-bar-4')
            ];
            const label = document.getElementById('strength-label');

            // Reset
            bars.forEach(b => b.className = 'strength-bar');
            label.className = 'strength-label';
            label.textContent = '';

            if (password.length === 0) return;

            let score = 0;
            if (password.length >= 6) score++;
            if (password.length >= 10) score++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            let strength, className;
            if (score <= 2) {
                strength = 'Weak';
                className = 'weak';
            } else if (score <= 3) {
                strength = 'Medium';
                className = 'medium';
            } else {
                strength = 'Strong';
                className = 'strong';
            }

            const activeBars = score <= 2 ? 1 : score <= 3 ? 2 : score <= 4 ? 3 : 4;
            for (let i = 0; i < activeBars; i++) {
                bars[i].classList.add(className);
            }

            label.textContent = strength;
            label.classList.add(className);
        }

        // ── Message Display ───────────────────────────────────────────
        function showMessage(text, type = 'info') {
            const messageEl = document.getElementById('auth-message');
            const messageText = document.getElementById('auth-message-text');
            const icon = messageEl.querySelector('i');

            messageEl.className = `auth-message show ${type}`;
            messageText.textContent = text;

            if (type === 'error') {
                icon.className = 'fa-solid fa-triangle-exclamation';
            } else if (type === 'success') {
                icon.className = 'fa-solid fa-circle-check';
            } else {
                icon.className = 'fa-solid fa-circle-info';
            }
        }

        function hideMessage() {
            document.getElementById('auth-message').className = 'auth-message';
        }

        // ── Keyboard shortcut: Enter on inputs ───────────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && active.tagName === 'INPUT') {
                    const form = active.closest('form');
                    if (form) {
                        form.dispatchEvent(new Event('submit', { cancelable: true }));
                    }
                }
            }
        });
    </script>
</body>
</html>
